name: CI Pipeline ML

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Creer les donnees de test CI
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("data/raw/churn.csv")
          path.parent.mkdir(parents=True, exist_ok=True)
          if not path.exists():
              path.write_text(
                  "\n".join(
                      [
                          "age,tenure_months,monthly_charges,contract_type,payment_method,internet_service,support_calls,churn",
                          "24,2,79.9,Monthly,Electronic check,Fiber,4,1",
                          "45,36,54.2,One year,Bank transfer,DSL,1,0",
                          "52,48,49.8,Two year,Credit card,DSL,0,0",
                          "31,6,88.5,Monthly,Electronic check,Fiber,5,1",
                          "38,18,71.3,Monthly,Bank transfer,Fiber,2,0",
                          "29,4,74.1,Monthly,Mailed check,Fiber,3,1",
                          "50,42,51.7,Two year,Credit card,DSL,0,0",
                          "27,3,91.2,Monthly,Electronic check,Fiber,6,1",
                          "41,24,65.0,One year,Credit card,DSL,1,0",
                          "22,1,95.0,Monthly,Electronic check,Fiber,7,1",
                      ]
                  ),
                  encoding="utf-8",
              )
          PY

      - name: Generer les artefacts
        run: python main.py

      - name: Verifier que les artefacts existent
        run: |
          test -f artifacts/model.pkl || (echo "Modele manquant" && exit 1)
          test -f artifacts/reference_sample.csv || (echo "Echantillon de reference manquant" && exit 1)

      - name: Lancer les tests
        run: pytest tests/ -v

      - name: Verifier que l'API demarre
        run: |
          uvicorn app:app --port 8001 &
          sleep 5
          curl -f http://localhost:8001/health || exit 1
